name: APK Uretici

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Java Kurulumu
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Calistirma Iznini Ver
      run: chmod +x JarvisAI/gradlew
    - name: APK Derle
      run: ./gradlew assembleDebug
      working-directory: JarvisAI
    - name: APK Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: JarvisAI/app/build/outputs/apk/debug/app-debug.apk
